# Supabase local development config (CLI). Phone OTP is the primary auth
# (APP_RULES / prompt §4); email magic link is the fallback.
project_id = "tournament-os"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[auth.sms]
enable_signup = true
enable_confirmations = true
# Local dev: test OTP so no SMS provider is needed.
[auth.sms.test_otp]
"+919800000001" = "123456"
"+919800000002" = "123456"

# Production SMS provider (MSG91 not natively supported by GoTrue; Twilio
